<div class="d-flex flex-row justify-content-between align-items-center mb-3">
  <h2 class="fw-bold fs-2 mb-4">Inscripciones</h2>

  @if (!isLoading) {
    <button title="add" mat-flat-button class="ms-3 btn-color-primary text-uppercase">
      <mat-icon>add</mat-icon>
      Nueva Inscripción
    </button>
  }
</div>

 @if (isLoading) {
  <div class="py-5">
    <mat-spinner class="mx-auto"/>
  </div>
 } @else {
    <table class="table">
      <thead>
        <tr>
          <th>Fecha inscripcion</th>
          <th>Curso inscrito (id)</th>
          <th>Alumno inscrito (id)</th>
          <th>Usuario que realizó la inscripción (id)</th>
        </tr>
      </thead>
    </table>
   <!-- <app-inscriptions-table
     [dataSource]="dataSource"
   /> -->
 }
